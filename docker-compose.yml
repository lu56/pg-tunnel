version: "3.8"

services:
  pg-tunnel:
    image: viplu56/pg-tunnel:latest
    container_name: pg-tunnel
    # host 网络模式：sshd 直接绑定宿主机网络
    # PermitOpen PG_HOST:PG_PORT → 到达 PG
    network_mode: host
    restart: unless-stopped
    environment:
      - TUNNEL_PUBLIC_KEY=${TUNNEL_PUBLIC_KEY}
      - SSH_PORT=${SSH_PORT:-2222}
      - PG_HOST=${PG_HOST:-localhost}
      - PG_PORT=${PG_PORT:-15432}
    volumes:
      # SSH host keys 持久化，容器重建后 host key 不变
      - ./host_keys:/etc/ssh/host_keys
